<body>
	<div class="main-container">
    <div class="moodboard-grid" id="capture-area">
        <div class="slot"><input type="file" onchange="upload(this)"></div>

		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="central-slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>
		<div class="slot"><input type="file" onchange="upload(this)"></div>

</div>
    <img src="overlay.png" class="figma-mask" style="opacity: 1;">

</div>
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    // 1. Функция загрузки картинки в слот
    function upload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const slot = input.closest('div');
                if (slot) {
                    slot.style.backgroundImage = 'url(' + e.target.result + ')';
                    slot.style.backgroundSize = 'cover';
                    slot.style.backgroundPosition = 'center';
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 2. Функция переключения текста
    function toggleMask() {
        const mask = document.querySelector('.figma-mask');
        if (mask) {
            // Проверяем текущую прозрачность
            if (mask.style.opacity === "0") {
                mask.style.opacity = "1";
            } else {
                mask.style.opacity = "0";
            }
        }
    }

    // 3. Функция скачивания (исправленная версия)
   function downloadMoodboard() {
    const container = document.getElementById("capture-area"); // Скачиваем только сетку
    
    if (typeof html2canvas === 'undefined') {
        alert("Библиотека еще загружается, подождите 5 секунд...");
        return;
    }

    html2canvas(container, {
        useCORS: true,
        allowTaint: false,
        logging: true, // Это поможет увидеть ошибки в консоли, если не сработает
        scale: 2
    }).then(canvas => {
        const image = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = 'my-moodboard.png';
        link.href = image;
        link.click();
    }).catch(err => {
        console.error("Ошибка скачивания:", err);
    });
}
</script>
	
	<div class="controls">
    <button class="btn-toggle" onclick="toggleMask()">Show/Hide Labels</button>
    <button class="btn-download" onclick="downloadMoodboard()">Download PNG</button>
</div>
	
</body>
</html>
